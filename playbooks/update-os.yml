---
- name: Mise à jour OS — Workers (worker01, master02)
  hosts: k3s_agents
  serial: 1
  become: true

  tasks:
    - name: Drain le nœud
      delegate_to: localhost
      command: >
        kubectl drain {{ inventory_hostname }}
        --ignore-daemonsets
        --delete-emptydir-data
        --timeout=120s
      environment:
        KUBECONFIG: ~/.kube/config

    - name: Mise à jour des paquets
      apt:
        upgrade: full
        update_cache: true
        autoremove: true

    - name: Vérifier si reboot nécessaire
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot si nécessaire
      reboot:
        reboot_timeout: 300
      when: reboot_required.stat.exists

    - name: Uncordon le nœud
      delegate_to: localhost
      command: kubectl uncordon {{ inventory_hostname }}
      environment:
        KUBECONFIG: ~/.kube/config

    - name: Attendre Ready
      delegate_to: localhost
      command: >
        kubectl wait node {{ inventory_hostname }}
        --for=condition=Ready --timeout=120s
      environment:
        KUBECONFIG: ~/.kube/config

- name: Mise à jour OS — Control plane (master01 en dernier)
  hosts: k3s_servers
  serial: 1
  become: true

  tasks:
    - name: Mise à jour des paquets
      apt:
        upgrade: full
        update_cache: true
        autoremove: true

    - name: Vérifier si reboot nécessaire
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot si nécessaire
      reboot:
        reboot_timeout: 300
      when: reboot_required.stat.exists
