---
- name: Audit disque K3s
  hosts: k3s_cluster
  become: true
  gather_facts: false

  tasks:
    - name: Top répertoires /
      ansible.builtin.shell: du -xhd1 / 2>/dev/null | sort -h
      register: root_usage
      changed_when: false

    - name: Top répertoires /var/lib
      ansible.builtin.shell: du -xhd1 /var/lib 2>/dev/null | sort -h
      register: varlib_usage
      changed_when: false

    - name: Top répertoires Rancher
      ansible.builtin.shell: du -xhd2 /var/lib/rancher 2>/dev/null | sort -h
      register: rancher_usage
      changed_when: false

    - name: Afficher audit disque
      ansible.builtin.debug:
        msg:
          - "===== {{ inventory_hostname }} ====="
          - "/"
          - "{{ root_usage.stdout_lines }}"
          - "/var/lib"
          - "{{ varlib_usage.stdout_lines }}"
          - "/var/lib/rancher"
          - "{{ rancher_usage.stdout_lines }}"
