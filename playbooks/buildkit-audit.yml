---
- name: Audit BuildKit
  hosts: k3s_cluster
  become: true
  gather_facts: false

  tasks:
    - name: Taille BuildKit
      ansible.builtin.shell: du -xhd2 /var/lib/buildkit 2>/dev/null | sort -h || true
      register: buildkit_usage
      changed_when: false

    - name: Afficher BuildKit
      ansible.builtin.debug:
        msg:
          - "===== {{ inventory_hostname }} ====="
          - "{{ buildkit_usage.stdout_lines }}"
