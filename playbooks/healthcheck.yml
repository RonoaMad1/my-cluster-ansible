---
- name: Healthcheck nodes K3s
  hosts: k3s_cluster
  gather_facts: true

  tasks:
    - name: Disk usage
      ansible.builtin.command: df -h /
      register: disk_usage
      changed_when: false

    - name: Memory usage
      ansible.builtin.command: free -h
      register: memory_usage
      changed_when: false

    - name: Uptime
      ansible.builtin.command: uptime
      register: uptime_info
      changed_when: false

    - name: Show health summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "{{ uptime_info.stdout }}"
          - "{{ disk_usage.stdout_lines }}"
          - "{{ memory_usage.stdout_lines }}"
