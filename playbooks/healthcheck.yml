---
- name: Healthcheck nodes K3s
  hosts: k3s_cluster
  gather_facts: true

  tasks:
    - name: Hostname
      ansible.builtin.command: hostname
      changed_when: false

    - name: Uptime
      ansible.builtin.command: uptime
      changed_when: false

    - name: Disk usage
      ansible.builtin.command: df -h /
      changed_when: false

    - name: Memory usage
      ansible.builtin.command: free -h
      changed_when: false
