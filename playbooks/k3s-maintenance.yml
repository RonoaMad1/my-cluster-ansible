---
- name: Maintenance rolling workers
  hosts: k3s_agents
  serial: 1
  become: true

  roles:
    - k3s-maintenance

- name: Maintenance control-plane
  hosts: k3s_servers
  serial: 1
  become: true

  tasks:
    - name: Upgrade OS packages
      ansible.builtin.apt:
        upgrade: full
        update_cache: true
        autoremove: true

    - name: Check reboot required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: reboot_required.stat.exists
